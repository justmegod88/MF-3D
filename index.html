<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ACUVUE Product | 183가지 광학부</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --line:#d8e2ef;
      --text:#15304b;
      --sub:#60758a;
      --blue:#005EB8;
      --blue-deep:#0d4f96;
      --shadow:0 14px 34px rgba(16,42,67,.10);
      --shadow-soft:0 10px 24px rgba(16,42,67,.08);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:linear-gradient(180deg,#eef4fb 0%, #f7f9fc 60%, #f3f6fb 100%);
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Segoe UI",Arial,sans-serif;
      color:var(--text);
    }
    .wrap{max-width:980px;margin:0 auto;padding:18px 14px 40px}

    .top-cards{margin-bottom:18px}
    .menu-card{
      background:var(--card);
      border:1.5px solid #dbe5f1;
      border-radius:22px;
      padding:20px 18px 18px;
      box-shadow:var(--shadow);
      min-height:118px;
      cursor:pointer;
      transition:.2s ease;
      width:100%;
    }
    .menu-card.active{
      border-color:#b8d2f6;
      background:linear-gradient(180deg,#ffffff 0%, #f5f9ff 100%);
      box-shadow:0 14px 34px rgba(13,99,198,.10);
    }
    .menu-eyebrow{
      font-size:18px;
      line-height:1.2;
      font-weight:700;
      letter-spacing:-.03em;
      color:#314962;
      margin-bottom:6px;
      word-break:keep-all;
    }
    .menu-title{
      font-size:22px;
      line-height:1.2;
      font-weight:900;
      letter-spacing:-.03em;
      color:#102a46;
      margin-bottom:10px;
      word-break:keep-all;
    }
    .menu-sub{
      font-size:15px;
      color:#66798e;
      line-height:1.4;
    }

    .hero-3d{
      background:linear-gradient(180deg,#f9fbff 0%, #f2f6fc 100%);
      border:1.5px solid #dce5f1;
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:18px 18px 22px;
      margin-bottom:18px;
      position:relative;
      z-index:1;
    }
    .hero-viewer{
      width:100%;
      min-height:460px;
      border-radius:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,.96) 0%, rgba(255,255,255,.45) 18%, rgba(255,255,255,0) 34%),
        linear-gradient(180deg,#fbfcff 0%, #f3f7fd 100%);
    }
    model-viewer{
      width:100%;
      height:460px;
      background:transparent;
      --poster-color:transparent;
      display:block;
    }

    .powermap-panel{
      margin-top:18px;
      padding:0 8px;
      transition:.2s ease;
    }
    .powermap-title{
      font-size:18px;
      font-weight:900;
      letter-spacing:-.03em;
      color:#102a46;
      margin:0 0 10px;
    }
    .powermap-row{
      display:grid;
      grid-template-columns:auto 1fr auto;
      gap:10px;
      align-items:center;
    }
    .powermap-label{
      font-size:14px;
      line-height:1;
      font-weight:800;
      color:#264968;
      white-space:nowrap;
    }
    .powermap-bar-wrap{
      position:relative;
      height:28px;
      display:flex;
      align-items:center;
    }
    .powermap-bar{
      width:100%;
      height:18px;
      border-radius:999px;
      position:relative;
      overflow:hidden;
      border:2px solid #183a64;
      background:
        linear-gradient(90deg,
          #5147a5 0%,
          #6d6fbd 26%,
          #9eb7d8 56%,
          #7ec0df 78%,
          #73c7e7 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.35),
        0 4px 10px rgba(24,58,100,.10);
    }
    .powermap-bar::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,.16) 0%, rgba(255,255,255,0) 55%);
      pointer-events:none;
    }
    .powermap-tick{
      position:absolute;
      top:50%;
      width:4px;
      height:16px;
      border-radius:999px;
      background:#27496f;
      transform:translate(-50%,-50%);
      box-shadow:0 0 0 2px rgba(255,255,255,.28);
      opacity:.85;
    }
    .tick-1{left:20%}
    .tick-2{left:55%}
    .tick-3{left:78%}

    .hero-buttons{
      display:flex;
      justify-content:center;
      gap:12px;
      margin-top:18px;
      position:relative;
      z-index:2;
      flex-wrap:nowrap;
    }
    .round-btn,.mode-btn{
      height:64px;
      border-radius:22px;
      border:1.5px solid #d3deec;
      background:#fff;
      color:#13314c;
      font-size:16px;
      font-weight:900;
      letter-spacing:-.02em;
      box-shadow:var(--shadow-soft);
      cursor:pointer;
      -webkit-appearance:none;
      appearance:none;
      pointer-events:auto;
      flex:0 0 auto;
    }
    .round-btn{width:92px;font-size:30px;display:flex;align-items:center;justify-content:center}
    .mode-btn{width:206px}
    .mode-btn.active{
      background:linear-gradient(180deg,var(--blue) 0%, #0b5bb5 100%);
      color:#fff;
      border-color:var(--blue);
      box-shadow:0 14px 28px rgba(13,99,198,.20);
    }

    @media (max-width:720px){
      .menu-card{
        min-height:108px;
        padding:16px 14px;
      }
      .menu-eyebrow{font-size:16px}
      .menu-title{font-size:19px}
      .menu-sub{font-size:13px}

      .hero-viewer,model-viewer{
        min-height:380px;
        height:380px;
      }

      .powermap-title{font-size:16px;margin-bottom:8px}
      .powermap-label{font-size:12px}
      .powermap-bar-wrap{height:24px}
      .powermap-bar{height:16px}
      .powermap-tick{height:14px;width:3px}

      .hero-buttons{
        gap:10px;
      }
      .round-btn{
        width:78px;
        height:58px;
        border-radius:20px;
        font-size:28px;
      }
      .mode-btn{
        width:160px;
        height:58px;
        border-radius:20px;
        font-size:14px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-cards">
      <div class="menu-card" id="card1">
        <div class="menu-eyebrow">모든 거리 선명한 시야</div>
        <div class="menu-title">183개 동공 사이즈별 광학부</div>
        <div class="menu-sub">카드를 눌러 확인</div>
      </div>
    </div>

    <section class="hero-3d">
      <div class="hero-viewer">
        <model-viewer
          id="lensViewer"
          src="lens_clear.glb"
          camera-controls
          auto-rotate
          auto-rotate-delay="0"
          rotation-per-second="18deg"
          shadow-intensity="1"
          exposure="1.1"
          environment-image="neutral"
          camera-orbit="0deg 75deg 105%"
          min-camera-orbit="auto auto 72%"
          max-camera-orbit="auto auto 170%"
          interaction-prompt="none"
          touch-action="pan-y"
          ar="false">
        </model-viewer>
      </div>

      <div class="powermap-panel" id="powermapPanel" style="display:none;">
        <h3 class="powermap-title">도수 분포</h3>
        <div class="powermap-row">
          <div class="powermap-label">근용도수</div>
          <div class="powermap-bar-wrap">
            <div class="powermap-bar">
              <span class="powermap-tick tick-1"></span>
              <span class="powermap-tick tick-2"></span>
              <span class="powermap-tick tick-3"></span>
            </div>
          </div>
          <div class="powermap-label">원용도수</div>
        </div>
      </div>

      <div class="hero-buttons">
        <button class="round-btn" id="resetBtn" type="button">↺</button>
        <button class="mode-btn" id="transparentBtn" type="button">투명 렌즈 모드</button>
        <button class="mode-btn active" id="powerBtn" type="button">렌즈 파워 MAP</button>
      </div>
    </section>
  </div>

  <script>
    const viewer = document.getElementById('lensViewer');
    const resetBtn = document.getElementById('resetBtn');
    const transparentBtn = document.getElementById('transparentBtn');
    const powerBtn = document.getElementById('powerBtn');
    const card1 = document.getElementById('card1');
    const powermapPanel = document.getElementById('powermapPanel');

    function setMode(mode){
      transparentBtn.classList.toggle('active', mode === 'transparent');
      powerBtn.classList.toggle('active', mode === 'power');
      viewer.src = mode === 'transparent' ? 'lens_clear.glb' : 'lens_powermap.glb';
      powermapPanel.style.display = mode === 'power' ? 'block' : 'none';
    }

    function resetViewer(){
      viewer.cameraOrbit = '0deg 75deg 105%';
      viewer.fieldOfView = '30deg';
    }

    transparentBtn.addEventListener('click', () => setMode('transparent'));
    powerBtn.addEventListener('click', () => setMode('power'));
    resetBtn.addEventListener('click', resetViewer);

    card1.addEventListener('click', () => {
      window.open('card1.html', '_blank');
    });

    setMode('power');
  </script>
</body>
</html>

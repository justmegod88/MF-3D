<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ACUVUE Product | 183가지 광학부</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --line:#d8e2ef;
      --text:#15304b;
      --sub:#60758a;
      --blue:#005EB8;
      --blue-dark:#004a91;
      --blue-soft:#eaf3ff;
      --shadow:0 14px 34px rgba(16,42,67,.10);
      --radius:24px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:linear-gradient(180deg,#eef4fb 0%, #f7f9fc 60%, #f3f6fb 100%);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Segoe UI",Arial,sans-serif;color:var(--text)}
    .wrap{max-width:980px;margin:0 auto;padding:18px 14px 40px}

    .top-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
    .menu-card{background:var(--card);border:1.5px solid #dbe5f1;border-radius:22px;padding:18px 16px 16px;box-shadow:var(--shadow);min-height:118px;cursor:pointer;transition:.2s ease}
    .menu-card.active{border-color:#b8d2f6;background:linear-gradient(180deg,#ffffff 0%, #f5f9ff 100%);box-shadow:0 14px 34px rgba(13,99,198,.10)}
    .menu-num{font-size:17px;font-weight:800;color:#5b6f86;margin-bottom:8px}
    .menu-title{font-size:22px;line-height:1.2;font-weight:900;letter-spacing:-.03em;color:#102a46;margin-bottom:6px;word-break:keep-all}
    .menu-sub{font-size:15px;color:#66798e;line-height:1.4}

    .hero-3d{background:linear-gradient(180deg,#f9fbff 0%, #f2f6fc 100%);border:1.5px solid #dce5f1;border-radius:28px;box-shadow:var(--shadow);padding:18px 18px 22px;margin-bottom:18px}
    .hero-viewer{width:100%;min-height:460px;border-radius:24px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:
      radial-gradient(circle at 50% 35%, rgba(255,255,255,.96) 0%, rgba(255,255,255,.45) 18%, rgba(255,255,255,0) 34%),
      linear-gradient(180deg,#fbfcff 0%, #f3f7fd 100%)}
    model-viewer{width:100%;height:460px;background:transparent;--poster-color:transparent}

    .hero-buttons{display:grid;grid-template-columns:84px 1fr 1fr;gap:12px;margin-top:18px}
    .round-btn,.mode-btn{height:72px;border-radius:22px;border:1.5px solid #d3deec;background:#fff;color:#13314c;font-size:16px;font-weight:900;letter-spacing:-.02em;box-shadow:var(--shadow);cursor:pointer}
    .mode-btn.active{background:linear-gradient(180deg,var(--blue) 0%, #0b5bb5 100%);color:#fff;border-color:var(--blue);box-shadow:0 14px 28px rgba(13,99,198,.20)}
    .round-btn{font-size:30px;display:flex;align-items:center;justify-content:center}

    .detail-panel{display:none;background:linear-gradient(180deg,#f9fbff 0%, #f2f6fc 100%);border:1.5px solid #dce5f1;border-radius:28px;box-shadow:var(--shadow);overflow:hidden}
    .detail-panel.active{display:block}
    .detail-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line);background:#fff}
    .detail-title{font-size:18px;font-weight:900;letter-spacing:-.02em;color:#16314e}
    .detail-sub{font-size:13px;color:var(--sub);font-weight:800}
    .close-btn{border:1px solid var(--line);background:#fff;border-radius:14px;padding:10px 14px;font-weight:900;color:var(--text);cursor:pointer}
    iframe{width:100%;height:1800px;border:0;display:block;background:#fff}

    @media (max-width:720px){
      .menu-card{min-height:108px;padding:16px 14px}
      .menu-title{font-size:19px}
      .menu-sub{font-size:13px}
      .hero-viewer,model-viewer{min-height:380px;height:380px}
      .hero-buttons{grid-template-columns:76px 1fr 1fr}
      .detail-title{font-size:16px}
      iframe{height:1900px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-cards">
      <div class="menu-card" id="card1">
        <div class="menu-num">01</div>
        <div class="menu-title">183가지 광학부</div>
        <div class="menu-sub">카드를 눌러 확인</div>
      </div>
      <div class="menu-card" id="card2">
        <div class="menu-num">02</div>
        <div class="menu-title">&nbsp;</div>
        <div class="menu-sub">&nbsp;</div>
      </div>
      <div class="menu-card" id="card3">
        <div class="menu-num">03</div>
        <div class="menu-title">&nbsp;</div>
        <div class="menu-sub">&nbsp;</div>
      </div>
    </div>

    <section class="hero-3d">
      <div class="hero-viewer">
        <model-viewer
          id="lensViewer"
          src="lens_clear.glb"
          camera-controls
          auto-rotate
          auto-rotate-delay="0"
          rotation-per-second="18deg"
          shadow-intensity="1"
          exposure="1.1"
          environment-image="neutral"
          camera-orbit="0deg 75deg 105%"
          min-camera-orbit="auto auto 72%"
          max-camera-orbit="auto auto 170%"
          interaction-prompt="none"
          touch-action="pan-y"
          ar="false">
        </model-viewer>
      </div>

      <div class="hero-buttons">
        <button class="round-btn" id="resetBtn" type="button">↺</button>
        <button class="mode-btn active" id="transparentBtn" type="button">투명 렌즈 모드</button>
        <button class="mode-btn" id="powerBtn" type="button">렌즈 파워 MAP</button>
      </div>
    </section>

    <section class="detail-panel" id="detailPanel">
      <div class="detail-head">
        <div>
          <div class="detail-title">183가지 광학부</div>
          <div class="detail-sub">상세 페이지</div>
        </div>
        <button class="close-btn" id="closeBtn" type="button">닫기</button>
      </div>
      <iframe id="detailFrame" src="acuvue_183_updated_v3.html" title="183가지 광학부 상세"></iframe>
    </section>
  </div>

  <script>
    const viewer = document.getElementById('lensViewer');
    const resetBtn = document.getElementById('resetBtn');
    const transparentBtn = document.getElementById('transparentBtn');
    const powerBtn = document.getElementById('powerBtn');
    const card1 = document.getElementById('card1');
    const detailPanel = document.getElementById('detailPanel');
    const closeBtn = document.getElementById('closeBtn');

    let currentMode = 'transparent';

    function setMode(mode){
      currentMode = mode;
      transparentBtn.classList.toggle('active', mode === 'transparent');
      powerBtn.classList.toggle('active', mode === 'power');

      if(mode === 'transparent'){
        viewer.style.filter = 'none';
        viewer.style.background = 'transparent';
      } else {
        viewer.style.filter = 'saturate(1.18) contrast(1.04)';
        viewer.style.background = 'radial-gradient(circle at 50% 48%, rgba(239,128,112,.12) 0%, rgba(239,195,99,.12) 22%, rgba(107,151,224,.10) 52%, rgba(0,0,0,0) 78%)';
      }
    }

    function resetViewer(){
      viewer.cameraOrbit = '0deg 75deg 105%';
      viewer.fieldOfView = '30deg';
      setMode('transparent');
    }

    function open183(){
      card1.classList.add('active');
      detailPanel.classList.add('active');
      setTimeout(() => detailPanel.scrollIntoView({behavior:'smooth', block:'start'}), 50);
    }

    function close183(){
      card1.classList.remove('active');
      detailPanel.classList.remove('active');
    }

    resetBtn.addEventListener('click', resetViewer);
    transparentBtn.addEventListener('click', ()=>setMode('transparent'));
    powerBtn.addEventListener('click', ()=>setMode('power'));
    card1.addEventListener('click', open183);
    closeBtn.addEventListener('click', close183);

    setMode('transparent');
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ACUVUE Product | 183가지 광학부</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --line:#d8e2ef;
      --text:#15304b;
      --sub:#60758a;
      --blue:#005EB8;
      --shadow:0 14px 34px rgba(16,42,67,.10);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:linear-gradient(180deg,#eef4fb 0%, #f7f9fc 60%, #f3f6fb 100%);
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Segoe UI",Arial,sans-serif;
      color:var(--text);
    }
    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:18px 14px 40px;
    }

    .top-cards{
      margin-bottom:18px;
    }
    .menu-card{
      background:var(--card);
      border:1.5px solid #dbe5f1;
      border-radius:22px;
      padding:18px 16px 16px;
      box-shadow:var(--shadow);
      min-height:118px;
      cursor:pointer;
      transition:.2s ease;
      width:100%;
    }
    .menu-card.active{
      border-color:#b8d2f6;
      background:linear-gradient(180deg,#ffffff 0%, #f5f9ff 100%);
      box-shadow:0 14px 34px rgba(13,99,198,.10);
    }
    .menu-eyebrow{
      font-size:18px;
      line-height:1.2;
      font-weight:700;
      letter-spacing:-.03em;
      color:#314962;
      margin-bottom:6px;
      word-break:keep-all;
    }
    .menu-title{
      font-size:22px;
      line-height:1.2;
      font-weight:900;
      letter-spacing:-.03em;
      color:#102a46;
      margin-bottom:10px;
      word-break:keep-all;
    }
    .menu-sub{
      font-size:15px;
      color:#66798e;
      line-height:1.4;
    }

    .hero-3d{
      background:linear-gradient(180deg,#f9fbff 0%, #f2f6fc 100%);
      border:1.5px solid #dce5f1;
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:18px 18px 22px;
      margin-bottom:18px;
      position:relative;
      z-index:1;
    }
    .hero-viewer{
      width:100%;
      min-height:460px;
      border-radius:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,.96) 0%, rgba(255,255,255,.45) 18%, rgba(255,255,255,0) 34%),
        linear-gradient(180deg,#fbfcff 0%, #f3f7fd 100%);
    }
    model-viewer{
      width:100%;
      height:460px;
      background:transparent;
      --poster-color:transparent;
      display:block;
    }

    /* 도수 분포 그래프 */
    .power-graph-wrap{
      display:none;
      margin-top:14px;
      margin-bottom:14px;
      padding:6px 4px 0;
      position:relative;
      z-index:2;
    }
    .power-graph-wrap.show{
      display:block;
    }
    .power-graph-title{
      font-size:22px;
      line-height:1.2;
      font-weight:900;
      letter-spacing:-.03em;
      color:#0e2642;
      margin-bottom:10px;
      word-break:keep-all;
    }
    .power-graph-row{
      display:flex;
      align-items:center;
      gap:14px;
      width:100%;
    }
    .power-graph-label{
      flex:0 0 auto;
      font-size:18px;
      line-height:1.2;
      font-weight:800;
      color:#243c56;
      white-space:nowrap;
      letter-spacing:-.02em;
    }
    .power-graph-bar{
      flex:1 1 auto;
      position:relative;
      height:24px;
      border-radius:999px;
      overflow:hidden;
      border:2px solid #173452;
      background:#dce8f5;
      box-shadow:
        inset 0 2px 6px rgba(255,255,255,.45),
        0 4px 12px rgba(16,42,67,.08);
    }
    .power-graph-fill{
      position:absolute;
      inset:0;
      background:linear-gradient(90deg,
        #3c3f8d 0%,
        #555da6 18%,
        #8ea0cc 42%,
        #9db6dc 65%,
        #85c0e2 82%,
        #78c7e8 100%);
    }
    .power-graph-divider{
      position:absolute;
      top:2px;
      bottom:2px;
      width:2px;
      background:rgba(24,47,77,.72);
      border-radius:2px;
      box-shadow:0 0 0 1px rgba(255,255,255,.18);
    }
    .power-graph-divider.d1{ left:20%; }
    .power-graph-divider.d2{ left:55%; }
    .power-graph-divider.d3{ left:78%; }

    .hero-buttons{
      display:grid;
      grid-template-columns:84px 1fr 1fr;
      gap:12px;
      margin-top:18px;
      position:relative;
      z-index:2;
    }
    .round-btn,.mode-btn{
      height:72px;
      border-radius:22px;
      border:1.5px solid #d3deec;
      background:#fff;
      color:#13314c;
      font-size:16px;
      font-weight:900;
      letter-spacing:-.02em;
      box-shadow:var(--shadow);
      cursor:pointer;
      -webkit-appearance:none;
      appearance:none;
      pointer-events:auto;
    }
    .mode-btn.active{
      background:linear-gradient(180deg,var(--blue) 0%, #0b5bb5 100%);
      color:#fff;
      border-color:var(--blue);
      box-shadow:0 14px 28px rgba(13,99,198,.20);
    }
    .round-btn{
      font-size:30px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    @media (max-width:720px){
      .menu-card{
        min-height:108px;
        padding:16px 14px;
      }
      .menu-eyebrow{
        font-size:16px;
      }
      .menu-title{
        font-size:19px;
      }
      .menu-sub{
        font-size:13px;
      }
      .hero-viewer,model-viewer{
        min-height:380px;
        height:380px;
      }
      .power-graph-title{
        font-size:18px;
        margin-bottom:8px;
      }
      .power-graph-row{
        gap:10px;
      }
      .power-graph-label{
        font-size:14px;
      }
      .power-graph-bar{
        height:20px;
      }
      .hero-buttons{
        grid-template-columns:76px 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-cards">
      <div class="menu-card" id="card1">
        <div class="menu-eyebrow">모든 거리 선명한 시야</div>
        <div class="menu-title">183개 동공 사이즈별 광학부</div>
        <div class="menu-sub">카드를 눌러 확인</div>
      </div>
    </div>

    <section class="hero-3d">
      <div class="hero-viewer">
        <model-viewer
          id="lensViewer"
          src="lens_clear.glb"
          camera-controls
          auto-rotate
          auto-rotate-delay="0"
          rotation-per-second="18deg"
          shadow-intensity="1"
          exposure="1.1"
          environment-image="neutral"
          camera-orbit="0deg 75deg 105%"
          min-camera-orbit="auto auto 72%"
          max-camera-orbit="auto auto 170%"
          interaction-prompt="none"
          touch-action="pan-y"
          ar="false">
        </model-viewer>
      </div>

      <div class="power-graph-wrap" id="powerGraph" aria-label="도수 분포 그래프">
        <div class="power-graph-title">도수 분포</div>
        <div class="power-graph-row">
          <div class="power-graph-label">근용도수</div>
          <div class="power-graph-bar">
            <div class="power-graph-fill"></div>
            <span class="power-graph-divider d1"></span>
            <span class="power-graph-divider d2"></span>
            <span class="power-graph-divider d3"></span>
          </div>
          <div class="power-graph-label">원용도수</div>
        </div>
      </div>

      <div class="hero-buttons">
        <button class="round-btn" id="resetBtn" type="button">↺</button>
        <button class="mode-btn active" id="transparentBtn" type="button">투명 렌즈 모드</button>
        <button class="mode-btn" id="powerBtn" type="button">렌즈 파워 MAP</button>
      </div>
    </section>
  </div>

  <script>
    const viewer = document.getElementById('lensViewer');
    const resetBtn = document.getElementById('resetBtn');
    const transparentBtn = document.getElementById('transparentBtn');
    const powerBtn = document.getElementById('powerBtn');
    const card1 = document.getElementById('card1');
    const powerGraph = document.getElementById('powerGraph');

    function setMode(mode){
      const isPower = mode === 'power';

      transparentBtn.classList.toggle('active', mode === 'transparent');
      powerBtn.classList.toggle('active', isPower);
      viewer.src = isPower ? 'lens_powermap.glb' : 'lens_clear.glb';
      powerGraph.classList.toggle('show', isPower);
    }

    function resetViewer(){
      viewer.cameraOrbit = '0deg 75deg 105%';
      viewer.fieldOfView = '30deg';
    }

    transparentBtn.addEventListener('click', () => setMode('transparent'));
    powerBtn.addEventListener('click', () => setMode('power'));
    resetBtn.addEventListener('click', resetViewer);

    card1.addEventListener('click', () => {
      window.open('card1.html', '_blank');
    });
  </script>
</body>
</html>

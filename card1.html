<style>
  :root{
    --acuvue-blue:#0f66bd;
    --acuvue-blue-deep:#155f9d;
    --bg:#f3f5fa;
    --card:#ffffff;
    --line:#d9e2ee;
    --line-soft:#dfe7f2;
    --text:#1f4467;
    --title:#1f3554;
    --sub:#6b7b93;
    --shadow:0 14px 34px rgba(39,72,117,.08);
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    background:linear-gradient(180deg,#f4f6fb 0%, #f5f7fc 50%, #f2f4f9 100%);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Segoe UI",Arial,sans-serif;
    color:var(--text);
    padding:24px 18px 56px;
  }
  .wrap{
    max-width:980px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    gap:18px;
  }

  .hero,.card,.visionCard,.pageFootnote,.modalCard{
    width:100%;
    background:var(--card);
    border:1.5px solid var(--line);
    border-radius:30px;
    box-shadow:var(--shadow);
  }

  .hero{
    padding:20px 24px;
    overflow:hidden;
    position:relative;
    background:#fff;
  }
  .hero::after{
    content:"";
    position:absolute;
    right:-70px;
    top:-70px;
    width:220px;
    height:220px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(15,102,189,.10) 0%, rgba(15,102,189,.04) 42%, rgba(15,102,189,0) 72%);
    pointer-events:none;
  }

  .brand{
    display:inline-flex;
    align-items:center;
    gap:10px;
    background:#eef5fc;
    color:var(--acuvue-blue-deep);
    border:1px solid #d9e6f4;
    border-radius:999px;
    padding:8px 14px;
    font-size:14px;
    font-weight:800;
    margin-bottom:14px;
  }

  .heroTitle{
    margin:0;
    font-size:clamp(14px,2vw,18px);
    line-height:1.42;
    letter-spacing:-.03em;
    font-weight:900;
    max-width:760px;
    color:var(--title);
  }
  .heroTitle .accent{color:var(--acuvue-blue-deep)}
  .heroTitle .titleNote{
    color:#7e8ea5;
    font-weight:700;
    font-size:.82em;
  }

  .sliderCard > h3{display:none}

  .grid{display:flex;flex-direction:column;gap:18px}
  .card{padding:22px 22px 26px}
  .card h3,.visionCard h3,.modalCard h3{
    margin:0 0 12px;
    font-size:22px;
    letter-spacing:-.03em;
    line-height:1.3;
    color:var(--title);
  }

  .sliderCard .guide{display:none}
  .spec{display:flex;flex-direction:column;gap:16px}
  .sliderBlock{display:flex;flex-direction:column;gap:8px}
  .sliderTop{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center}
  .label{font-size:18px;font-weight:900;color:#5d738f}
  .value{font-size:18px;font-weight:900;color:var(--acuvue-blue);min-width:100px;text-align:right}
  input[type="range"]{width:100%;margin:0}
  .scale{display:flex;justify-content:space-between;font-size:12px;font-weight:800;color:var(--sub);padding:0 2px}

  .visualStage{display:flex;justify-content:center}
  .visualStack{
    width:min(100%,560px);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
  }

  .eyePanel,.lensPanel{
    position:relative;
    width:100%;
    display:flex;
    justify-content:center;
  }
  .eyeBase,.lensBase{display:block;max-width:100%;height:auto}
  .overlaySvg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}

  /* 상단 토글 */
  .toggleRow{
    width:min(100%,500px);
    display:flex;
    justify-content:center;
    margin-top:6px;
    margin-bottom:12px;
  }
  .pillToggle{
    width:100%;
    background:#f8fbff;
    border:1.5px solid #d6e0ec;
    border-radius:999px;
    padding:10px;
    display:grid;
    grid-template-columns:1fr 110px 110px;
    align-items:center;
    gap:10px;
    box-shadow:0 6px 18px rgba(32,74,123,.05);
  }
  .pillLabel{
    color:var(--acuvue-blue-deep);
    font-weight:900;
    font-size:18px;
    text-align:center;
    letter-spacing:-.02em;
  }
  .pillBtn{
    border:none;
    background:transparent;
    color:#5a7391;
    font-weight:900;
    border-radius:24px;
    height:60px;
    cursor:pointer;
    font-size:18px;
    letter-spacing:-.02em;
    transition:.2s ease;
  }
  .pillBtn.active{
    background:linear-gradient(180deg,#1970c7 0%, #0d5ea8 100%);
    color:#fff;
    box-shadow:0 10px 20px rgba(21,96,167,.22);
  }

  /* 안내 카드 */
  .messageBox{
    width:min(100%,560px);
    background:#fff;
    color:var(--title);
    border:1.5px solid #d8e1ee;
    border-radius:44px;
    padding:34px 28px 36px;
    text-align:center;
    box-shadow:0 12px 30px rgba(39,72,117,.08);
  }
  .messageBadge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:52px;
    padding:0 22px;
    border-radius:999px;
    background:#eaf2fb;
    color:var(--acuvue-blue-deep);
    font-size:18px;
    font-weight:900;
    letter-spacing:-.02em;
    margin-bottom:18px;
  }
  .messageTitle{
    margin:0;
    font-size:28px;
    line-height:1.42;
    letter-spacing:-.04em;
    font-weight:900;
    color:var(--text);
  }

  /* Vision 카드 */
  .visionCard{
    padding:28px 24px;
    border-radius:34px;
  }
  .visionTrigger{
    display:grid;
    grid-template-columns:1fr 180px;
    align-items:center;
    gap:20px;
  }
  .visionTrigger h3{
    margin:0 0 8px;
    font-size:34px;
    line-height:1.05;
    color:#243d63;
    font-weight:900;
    letter-spacing:-.04em;
  }
  .visionTrigger .muted{
    color:#6e7f97;
    font-weight:800;
    font-size:18px;
    line-height:1.35;
  }

  .btn{
    border:1px solid var(--line);
    background:#fff;
    border-radius:16px;
    padding:12px 16px;
    font-weight:900;
    cursor:pointer;
    color:var(--text);
    font-size:16px;
  }
  .btn.primary{
    background:linear-gradient(180deg,#156bc4 0%, #0f61b4 100%);
    border-color:#0f61b4;
    color:#fff;
    box-shadow:0 10px 22px rgba(18,97,180,.20);
  }

  #openVisionBtn{
    min-height:108px;
    border-radius:26px;
    font-size:22px;
    line-height:1.25;
    padding:0 20px;
    white-space:normal;
  }

  .muted{
    color:var(--sub);
    font-weight:800;
    font-size:13px;
    line-height:1.45;
  }

  .pageFootnote{
    padding:10px 8px 0;
    color:#6f7f96;
    font-weight:900;
    font-size:18px;
    line-height:1.45;
    text-align:center;
    background:transparent;
    border:none;
    box-shadow:none;
    border-radius:0;
  }

  .modalBack{
    position:fixed;
    inset:0;
    background:rgba(11,31,51,.52);
    display:none;
    align-items:center;
    justify-content:center;
    padding:18px;
    z-index:1000;
  }
  .modalBack.open{display:flex}
  .modalCard{
    max-width:920px;
    padding:18px;
    position:relative;
  }
  .modalClose{position:absolute;right:16px;top:16px}
  .visionGrid{
    display:grid;
    grid-template-columns:1fr 320px;
    gap:12px;
    align-items:stretch;
    margin-top:8px;
  }
  .screen{
    border:1px solid var(--line);
    border-radius:18px;
    overflow:hidden;
    background:#000;
    position:relative;
    min-height:320px;
  }
  .screen video,.screen img{width:100%;height:100%;object-fit:cover;display:block}
  .layer{position:absolute;inset:0}
  .layer.blurred{filter:blur(8px) contrast(1.05);opacity:0;transition:opacity .2s ease}
  .mask-center .layer.blurred{
    opacity:1;
    -webkit-mask-image:radial-gradient(circle at 50% 50%, rgba(0,0,0,1) 0 46%, rgba(0,0,0,0) 62%);
    mask-image:radial-gradient(circle at 50% 50%, rgba(0,0,0,1) 0 46%, rgba(0,0,0,0) 62%);
  }
  .mask-periphery .layer.blurred{
    opacity:1;
    -webkit-mask-image:radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 0 55%, rgba(0,0,0,1) 72%);
    mask-image:radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 0 55%, rgba(0,0,0,1) 72%);
  }
  .fishbowl .layer.base{filter:url(#fishbowlFilter)}
  .explain{
    border:1px solid var(--line);
    border-radius:18px;
    padding:14px;
    background:#fafbfc;
    color:var(--sub);
    font-weight:900;
    font-size:13px;
    line-height:1.55;
  }
  .explain strong{color:var(--text)}
  .tagRow{display:flex;flex-wrap:wrap;gap:8px}
  .tag{
    display:inline-flex;
    align-items:center;
    padding:6px 10px;
    border-radius:999px;
    background:#eaf3ff;
    border:1px solid #cfe1f8;
    color:#195aa8;
    font-size:12px;
    font-weight:900;
  }

  @media (max-width:720px){
    body{padding:16px 12px 42px}
    .hero,.card,.visionCard,.modalCard{border-radius:26px}
    .card,.visionCard,.hero{padding:18px}
    .card h3,.visionCard h3,.modalCard h3{font-size:18px}
    .label,.value{font-size:16px}
    .heroTitle .titleNote{display:block;margin-top:8px;font-size:.9em}

    .pillToggle{
      grid-template-columns:1fr 88px 88px;
      padding:8px;
      gap:8px;
    }
    .pillLabel{font-size:16px}
    .pillBtn{
      height:52px;
      font-size:16px;
      border-radius:20px;
    }

    .messageBox{
      border-radius:34px;
      padding:26px 18px 28px;
    }
    .messageBadge{
      font-size:15px;
      min-height:44px;
      padding:0 16px;
      margin-bottom:14px;
    }
    .messageTitle{
      font-size:25px;
      line-height:1.38;
    }

    .visionTrigger{
      grid-template-columns:1fr 160px;
      gap:14px;
    }
    .visionTrigger h3{font-size:28px}
    .visionTrigger .muted{font-size:14px}
    #openVisionBtn{
      min-height:86px;
      font-size:16px;
      border-radius:22px;
    }

    .pageFootnote{
      font-size:15px;
      padding-top:4px;
    }

    .visionGrid{grid-template-columns:1fr}
  }
</style>
